databases:
  - name: nestsave-db
    databaseName: nestsave_production
    user: nestsave
    plan: basic-256mb

services:
  - type: web
    name: nestsave-web
    env: ruby
    plan: starter
    region: frankfurt
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nestsave-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: RAILS_LOG_TO_STDOUT
        value: true
      - key: APP_HOST
        sync: false
